<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응용</title>
</head>

<body>
    <script>
        let age = prompt("나이를 입력하세요")
        if (age >= 18) {
            alert("성인입니다");
        } else {
            alert("미성년자입니다")
        }

        let number = prompt("숫자를 입력하세요")
        if (number >= 0) {
            alert("양수입니다")
        } else {
            alert("음수입니다")
        }
    </script>

</body>

</html>
