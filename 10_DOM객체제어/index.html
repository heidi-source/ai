<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM(웹브라우저)객체 제어</title>
</head>

<body>
    <!-- class보단 id를 쓰는게 더 효율적 -->
    <ul id="list" class="gnb"></ul>
    <label for="">출생월</label>
    <select name="" id="month"></select>
    <label for="">출생일</label>
    <select id="day"></select>
    <label for="">출생년도</label>
    <select id="year"></select>

    <script>
        // ul태그요소를 자바스크립트로 가져와 메모리변수에 기억
        let listname = document.getElementById("list")
        console.log(listname);
        let output = ""
        // 지역변수     =/전역변수
        for (let i = 1; i <= 100; i++) {
            output = output + `<li>data${i}</li>`;
        }
        list.innerHTML = output;

        // 출생월 제어
        let monthname = document.getElementById("month");
        console.log(monthname);

        let output2 = "";
        for (let i = 1; i <= 12; i++) {
            output2 = output2 + `<option>${i}월</option>`;
        }
        month.innerHTML = output2;

        // 년도
        let yearname = document.getElementById("year");
        console.log(yearname);

        let option4 = "";
        for (let i = 2026; i >= 1990; i--) {
            option4 = option4 + `<option>${i}년</option>`;
        }
        yearname.innerHTML = option4;

        // 일자
        let dayname = document.getElementById("day");
        console.log(dayname);

        let output3 = "";
        for (let i = 1; i <= 31; i++) {
            output3 = output3 + `<option>${i}일</option>`;
        }
        day.innerHTML = output3;
    </script>
</body>

</html>
