<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box모델</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- div방식 -->
    <div class="box">
        <div class="child1">배너1</div>
        <div class="child2">배너2</div>
        <div class="child3">배너3</div>
    </div>

    <!-- ul/li방식(개발자모드) -->
    <ul>
        <li>배너1</li>
        <li>배너2</li>
        <li class="last">배너3</li>
    </ul>

</body>

</html>
