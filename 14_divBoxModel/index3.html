<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box모델3</title>
    <link rel="stylesheet" href="./css/style3.css">
</head>

<body>

    <div class="box">
        <div>박스1</div>
        <div>박스2</div>

    <!-- ul -->

        <li>박스2</li>
        <li class="last">박스3</li>
    </ul>

</body>
