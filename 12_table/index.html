<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외부 스타일(표만들기)</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- 표만들기 -->
    <table>
        <!-- 첫행(줄) -->
        <tr>
            <!-- 열 (칸)-->
            <th>1교시</th>
            <th>2교시</th>
            <th class="pf">3교시</th>
        </tr>
        <!-- <tr>두번째행(줄) -->
        <td>포토샵</td>
        <td>HTML</td>
        <td class="pf">JQUERY</td>
        </tr>
        <tr>
            <!-- 세번째행(즐) -->
            <td>일러스트</td>
            <td>CSS</td>
            <td class="pf">포트폴리오</td>
        </tr>
    </table>


</body>

</html>
