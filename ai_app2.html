<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조영희의 홈페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "나눔고딕", sans-serif;
            color: #000000;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            text-align: center;
            padding: 0 20px;
        }

        .title {
            color: #006600;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .intro {
            font-size: 14px;
            line-height: 2;
            color: #000000;
            margin-bottom: 25px;
        }

        .contact {
            font-size: 14px;
            line-height: 2;
            color: #000000;
            margin-bottom: 25px;
        }

        .contact a {
            color: #cc0000;
            text-decoration: underline;
            font-style: italic;
        }

        .date {
            font-size: 14px;
            color: #000000;
            margin-bottom: 30px;
        }

        .divider {
            margin: 20px auto;
            width: 300px;
            border: none;
            border-top: 5px solid #006600;
        }

        .footer-title {
            color: #006600;
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="container">

        <p class="title">조영희의 홈페이지에 오신 것을 환영합니다.</p>

        <p class="intro">
            멋진 홈페이지가 되도록 노력하겠습니다.<br>
            부디 저의 홈페이지에서 좋은 시간 가지시기 바라며<br>
            가실 때에 따뜻한 글한마디 남겨주시면 감사하겠습니다.
        </p>

        <p class="contact">
            그리고 제 홈페이지에 궁금한 점이 있으시면<br>
            <a href="mailto:young@naver.com">young@naver.com</a>으로<br>
            메일 보내주시기 바랍니다.
        </p>

        <p class="date">2026년 3월 23일</p>

        <hr class="divider">

        <p class="footer-title">KD컴퓨터학원 강의실에서</p>

        <hr class="divider">

    </div>
</body>

</html>
