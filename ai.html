<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진달래 꽃</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #faf7f8;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #33333;
      text-align: center;
    }

    h2 {
      font-size: 20px;
      font-weight: 400;
      color: #777;
      margin-bottom: 30px;
      text-align: right;
    }

    p {
      line-height: 1.8;
      margin-bottom: 20px;
      white-space: pre-line;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>진달래 꽃</h1>
    <h2>지은이: 김소월</h2>

    <p>
나 보기가
역겨워
가실 때에는
    </p>

    <p>
말없이
고이
보내 드리오리다
    </p>

    <p>
영변에
약산
진달래 꽃
    </p>

    <p>
진달래
진달래 꽃
피웠네
    </p>
  </div>
</body>
</html>
