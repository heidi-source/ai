<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리바이스상품</title>
    <style>
        p {
            text-align: center;
        }
    </style>
</head>

<body>
    <p id="top">
        <img src="./imgs/levis.jpg" alt="메인화면" usemap="#main">
        <map name="main">
            <area shape="rect" coords="11,48,275,697" href="#style1" alt="스타일1번">
            <area shape="rect" coords="294,55,563,695" href="#style2" alt="스타일2번">
            <area shape="rect" coords="567,51,855,690" href="#style3" alt="스타일3번">
        </map>
    </p>
    <p id="style1">
        <img src="./imgs/levis1.jpg" alt="1번스타일" usemap="#style1">
        <map name="style1">
            <area shape="circle" coords="803,5306,41" href="#top" alt="1번스타일">
        </map>
    </p>
    <p id="style2">
        <img src="./imgs/levis2.jpg" alt="2번스타일" usemap="#style2">
        <map name="style2">
            <area shape="circle" coords="813,6563,39" href="#top" alt="2번스타일">
        </map>
    </p>
    <p id="style3">
        <img src="./imgs/levis3.jpg" alt="3번스타일" usemap="#style3">
        <map name="style3">
            <area shape="circle" coords="802,5947,47" href="#top" alt="3번스타일">
        </map>
    </p>
</body>

</html>
