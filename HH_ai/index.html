<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0">
    <title>화해 Splash</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* 앱 프레임 */
        .app {
            width: 375px;
            height: 812px;
            position: relative;
            overflow: hidden;
            background: #f2f2f2;
        }

        /* 배경 */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 공통 원형 */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
        }

        /* 1번 원형 */
        .c1 {
            width: 152px;
            height: 152px;
            background: #A3D9C9;
            top: 15%;
            right: -40px;
            opacity: 0.7;
        }

        /* 2번 원형 */
        .c2 {
            width: 212px;
            height: 212px;
            background: #1E4F98;
            bottom: 20%;
            left: -60px;
            opacity: 0.6;
        }

        /* 3번 원형 */
        .c3 {
            width: 104px;
            height: 104px;
            background: #A3D9C9;
            bottom: 8%;
            right: 12%;
            opacity: 0.7;
        }

        /* 중앙 로고 영역 */
        .center {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
        }

        /* 로고 */
        .logo {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }

        /* 텍스트 */
        .title {
            font-size: 32px;
            color: #888;
            line-height: 1.1;
        }

        .title span {
            color: #7fd1c4;
        }

        .sub {
            font-size: 14px;
            color: #999;
            margin-left: 5px;
        }

        /* 로딩 텍스트 */
        .loading {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            color: #666;
        }

        /* 프로그레스 바 */
        .bar-wrap {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            overflow: hidden;
        }

        .bar {
            width: 0%;
            height: 100%;
            background: #7fd1c4;
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- 배경 -->
        <div class="bg">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>

        <!-- 로고 -->
        <div class="center">
            <img src="./images/logo.png.png" class="logo">
            <div class="title">
                <span>H</span>wa <br>
                <span>H</span>ae <span class="sub">[화해]</span>
            </div>
        </div>

        <!-- 로딩 -->
        <div class="loading" id="loadingText">0%</div>

        <div class="bar-wrap">
            <div class="bar" id="progressBar"></div>
        </div>

    </div>

    <script>
        const duration = 3000;
        const startTime = performance.now();

        const text = document.getElementById("loadingText");
        const bar = document.getElementById("progressBar");

        function animate(time) {
            const elapsed = time - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const percent = Math.floor(progress * 100);

            text.innerText = percent + "%";
            bar.style.width = percent + "%";

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // ✅ 로딩 완료 후 자동 이동
                window.location.href = "work1.html";
            }
        }

        requestAnimationFrame(animate);
    </script>

</body>

</html>
