<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 - CHIC</title>
    <link rel="stylesheet" href="./product-detail.html">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <button class="icon-btn back-btn" aria-label="뒤로가기" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M15 18l-6-6 6-6"></path>
                </svg>
            </button>

            <h1 class="logo">CHIC</h1>

            <div class="header-icons">
                <button class="icon-btn" aria-label="검색">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <a href="cart.html" class="icon-btn" aria-label="장바구니">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <main class="main-content detail-page">
        <section class="detail-hero">
            <div class="detail-image-wrap">
                <img id="detailImage" src="" alt="상품 이미지" class="detail-image">
            </div>
        </section>

        <section class="detail-info">
            <p class="detail-category" id="detailCategory"></p>
            <h2 class="detail-title" id="detailTitle"></h2>

            <div class="detail-price-row">
                <span class="detail-sale-rate" id="detailDiscount"></span>
                <strong class="detail-price" id="detailPrice"></strong>
            </div>

            <p class="detail-original-price" id="detailOriginalPrice"></p>

            <div class="detail-meta">
                <div class="meta-row">
                    <span class="meta-label">배송</span>
                    <span class="meta-value">무료배송</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">적립</span>
                    <span class="meta-value" id="detailPoint"></span>
                </div>
            </div>
        </section>

        <section class="detail-options">
            <div class="option-box">
                <label for="sizeSelect" class="option-label">사이즈</label>
                <select id="sizeSelect" class="option-select">
                    <option>사이즈 선택</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                </select>
            </div>

            <div class="option-box">
                <label for="colorSelect" class="option-label">컬러</label>
                <select id="colorSelect" class="option-select">
                    <option>컬러 선택</option>
                    <option>Ivory</option>
                    <option>Beige</option>
                    <option>Black</option>
                </select>
            </div>
        </section>

        <section class="detail-description">
            <h3 class="detail-section-title">상품 설명</h3>
            <p class="detail-text" id="detailDescription"></p>
        </section>

        <section class="detail-description">
            <h3 class="detail-section-title">상품 정보</h3>
            <div class="detail-spec">
                <div class="spec-row">
                    <span class="spec-label">소재</span>
                    <span class="spec-value">폴리에스터 70%, 레이온 30%</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">제조국</span>
                    <span class="spec-value">대한민국</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">세탁방법</span>
                    <span class="spec-value">드라이클리닝 권장</span>
                </div>
            </div>
        </section>
    </main>

    <div class="detail-action-bar">
        <button class="wish-btn" aria-label="찜하기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path
                    d="M12 21s-6.716-4.35-9.193-8.143C.809 9.78 2.126 5.5 6.09 5.5c2.12 0 3.338 1.166 3.91 2.18.572-1.014 1.79-2.18 3.91-2.18 3.964 0 5.281 4.28 3.283 7.357C18.716 16.65 12 21 12 21z">
                </path>
            </svg>
        </button>
        <button class="cart-action-btn">장바구니 담기</button>
        <button class="buy-action-btn">바로 구매</button>
    </div>

    <script>
        const productData = [
            {
                id: 1,
                category: "상의",
                name: "클래식 소프트 블라우스",
                price: "₩79,000",
                originalPrice: "₩99,000",
                discount: "20%",
                image: "https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1000",
                description: "부드러운 텍스처와 절제된 실루엣이 돋보이는 프리미엄 블라우스입니다. 데일리룩부터 오피스룩까지 자연스럽게 매치할 수 있습니다."
            },
            {
                id: 2,
                category: "아우터",
                name: "미니멀 테일러드 자켓",
                price: "₩109,000",
                originalPrice: "₩129,000",
                discount: "15%",
                image: "https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1000",
                description: "구조적인 실루엣과 세련된 무드가 살아있는 테일러드 자켓입니다."
            },
            {
                id: 3,
                category: "상의",
                name: "시그니처 소프트 니트",
                price: "₩59,000",
                originalPrice: "₩69,000",
                discount: "10%",
                image: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=1000",
                description: "가볍고 부드러운 착용감이 매력적인 니트입니다."
            },
            {
                id: 4,
                category: "하의",
                name: "슬림 스트레이트 팬츠",
                price: "₩69,000",
                originalPrice: "₩89,000",
                discount: "22%",
                image: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=1000",
                description: "자연스럽게 떨어지는 핏이 돋보이는 스트레이트 팬츠입니다."
            },
            {
                id: 5,
                category: "원피스",
                name: "모던 라인 원피스",
                price: "₩89,000",
                originalPrice: "₩109,000",
                discount: "18%",
                image: "https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=1000",
                description: "여성스러운 실루엣과 미니멀한 무드를 동시에 담은 원피스입니다."
            },
            {
                id: 6,
                category: "가방",
                name: "에센셜 레더 백",
                price: "₩119,000",
                originalPrice: "₩139,000",
                discount: "14%",
                image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=1000",
                description: "데일리룩에 쉽게 어울리는 세련된 무드의 레더 백입니다."
            },
            {
                id: 7,
                category: "슈즈",
                name: "클래식 로퍼",
                price: "₩99,000",
                originalPrice: "₩119,000",
                discount: "17%",
                image: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=1000",
                description: "포멀과 캐주얼 모두 자연스럽게 어우러지는 클래식 로퍼입니다."
            },
            {
                id: 8,
                category: "악세서리",
                name: "미니 골드 이어링",
                price: "₩39,000",
                originalPrice: "₩49,000",
                discount: "20%",
                image: "https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=1000",
                description: "심플하지만 포인트가 되는 데일리 골드 이어링입니다."
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const productId = Number(params.get("id")) || 1;
        const product = productData.find(item => item.id === productId) || productData[0];

        document.getElementById("detailCategory").textContent = product.category;
        document.getElementById("detailTitle").textContent = product.name;
        document.getElementById("detailPrice").textContent = product.price;
        document.getElementById("detailOriginalPrice").textContent = product.originalPrice;
        document.getElementById("detailDiscount").textContent = product.discount;
        document.getElementById("detailImage").src = product.image;
        document.getElementById("detailImage").alt = product.name;
        document.getElementById("detailDescription").textContent = product.description;
        document.getElementById("detailPoint").textContent = product.price.replace("₩", "").replace(",", "") ? "790P 적립 예정" : "0P";
        document.title = product.name + " - CHIC";
    </script>
</body>

</html>
