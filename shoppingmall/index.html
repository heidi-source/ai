<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIC - Premium Shopping Mall</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">CHIC</h1>
            <div class="header-icons">
                <button class="icon-btn" aria-label="검색">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <a href="./cart.html" class="icon-btn" aria-label="장바구니">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </a>
                <button class="icon-btn" aria-label="알림">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Category Tabs -->
        <div class="category-tabs-wrapper">
            <div class="category-tabs" id="categoryTabs">
                <button class="category-tab active" data-category="전체">전체</button>
                <button class="category-tab" data-category="아우터">아우터</button>
                <button class="category-tab" data-category="상의">상의</button>
                <button class="category-tab" data-category="하의">하의</button>
                <button class="category-tab" data-category="원피스">원피스</button>
                <button class="category-tab" data-category="가방">가방</button>
                <button class="category-tab" data-category="슈즈">슈즈</button>
                <button class="category-tab" data-category="악세서리">악세서리</button>
                <button class="category-tab" data-category="세일">세일</button>
            </div>
        </div>

        <!-- Hero Banner -->
        <section class="hero-banner">
            <div class="banner-content">
                <p class="banner-subtitle">SPRING COLLECTION 2026</p>
                <h2 class="banner-title">시크한 봄의 시작</h2>
                <p class="banner-description">프리미엄 셀렉션</p>
            </div>
        </section>

        <!-- Recommended Products -->
        <section class="products-section">
            <div class="section-header">
                <h2 class="section-title">추천 상품</h2>
                <button class="view-more-btn">더보기</button>
            </div>
            <div class="products-grid" id="recommendedProducts"></div>
        </section>

        <!-- Best Products -->
        <section class="products-section">
            <div class="section-header">
                <h2 class="section-title">베스트 상품</h2>
                <button class="view-more-btn">더보기</button>
            </div>
            <div class="products-grid" id="bestProducts"></div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-label">홈</span>
        </button>

        <button class="nav-btn" data-tab="category">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span class="nav-label">카테고리</span>
        </button>

        <button class="nav-btn" data-tab="cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="nav-label">장바구니</span>
        </button>

        <button class="nav-btn" data-tab="profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="nav-label">마이페이지</span>
        </button>
    </nav>

    <script src="./java/java.js"></script>
</body>

</html>
