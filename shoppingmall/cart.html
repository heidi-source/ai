<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - CHIC</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">CHIC</h1>
            <div class="header-icons">
                <button class="icon-btn" aria-label="검색">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <a href="cart.html" class="icon-btn" aria-label="장바구니">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </a>
                <button class="icon-btn" aria-label="알림">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Title -->
        <section class="page-title-section">
            <h2 class="page-title">장바구니</h2>
            <p class="page-subtitle">총 <span id="cartCount">3</span>개의 상품</p>
        </section>

        <!-- Cart Items -->
        <section class="cart-section">
            <div class="cart-items" id="cartItems">
                <div class="cart-item">
                    <div class="cart-item-checkbox">
                        <input type="checkbox" id="item1" checked>
                        <label for="item1"></label>
                    </div>
                    <div class="cart-item-image">
                        <img src="https://images.unsplash.com/photo-1592327877233-90b9bfd92e48?w=200" alt="프리미엄 울 코트">
                    </div>
                    <div class="cart-item-info">
                        <h3 class="cart-item-name">프리미엄 울 코트</h3>
                        <p class="cart-item-option">옵션: 블랙 / M</p>
                        <div class="cart-item-price-wrapper">
                            <span class="cart-item-discount">20%</span>
                            <span class="cart-item-price">318,400원</span>
                            <span class="cart-item-original-price">398,000원</span>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" data-action="decrease">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <span class="quantity-value">1</span>
                            <button class="quantity-btn" data-action="increase">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="cart-item-delete" aria-label="삭제">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="cart-item">
                    <div class="cart-item-checkbox">
                        <input type="checkbox" id="item2" checked>
                        <label for="item2"></label>
                    </div>
                    <div class="cart-item-image">
                        <img src="https://images.unsplash.com/photo-1764179690178-1cfd632e804b?w=200" alt="레더 토트백">
                    </div>
                    <div class="cart-item-info">
                        <h3 class="cart-item-name">레더 토트백</h3>
                        <p class="cart-item-option">옵션: 베이지</p>
                        <div class="cart-item-price-wrapper">
                            <span class="cart-item-discount">15%</span>
                            <span class="cart-item-price">378,250원</span>
                            <span class="cart-item-original-price">445,000원</span>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" data-action="decrease">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <span class="quantity-value">1</span>
                            <button class="quantity-btn" data-action="increase">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="cart-item-delete" aria-label="삭제">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="cart-item">
                    <div class="cart-item-checkbox">
                        <input type="checkbox" id="item3" checked>
                        <label for="item3"></label>
                    </div>
                    <div class="cart-item-image">
                        <img src="https://images.unsplash.com/photo-1603906650843-b58e94d9df4d?w=200" alt="캐시미어 니트">
                    </div>
                    <div class="cart-item-info">
                        <h3 class="cart-item-name">캐시미어 니트</h3>
                        <p class="cart-item-option">옵션: 크림 / L</p>
                        <div class="cart-item-price-wrapper">
                            <span class="cart-item-discount">25%</span>
                            <span class="cart-item-price">243,750원</span>
                            <span class="cart-item-original-price">325,000원</span>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" data-action="decrease">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <span class="quantity-value">2</span>
                            <button class="quantity-btn" data-action="increase">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="cart-item-delete" aria-label="삭제">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Price Summary -->
        <section class="price-summary">
            <div class="price-row">
                <span class="price-label">상품금액</span>
                <span class="price-value">1,427,900원</span>
            </div>
            <div class="price-row">
                <span class="price-label">할인금액</span>
                <span class="price-value discount">-287,500원</span>
            </div>
            <div class="price-row">
                <span class="price-label">배송비</span>
                <span class="price-value">무료</span>
            </div>
            <div class="price-row total">
                <span class="price-label">총 결제금액</span>
                <span class="price-value">1,140,400원</span>
            </div>
        </section>

        <!-- Checkout Button -->
        <div class="checkout-button-wrapper">
            <button class="checkout-button">주문하기</button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-label">홈</span>
        </a>

        <a href="category.html" class="nav-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span class="nav-label">카테고리</span>
        </a>

        <a href="cart.html" class="nav-btn active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="nav-label">장바구니</span>
        </a>

        <a href="mypage.html" class="nav-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="nav-label">마이페이지</span>
        </a>
    </nav>

    <script src="./java/cart.js"></script>
</body>

</html>
