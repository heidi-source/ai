<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응용문제2</title>
    <link rel="stylesheet" href="./css/style22.css">
</head>

<body>
    <h1>회원가입</h1>
    <form action="info" name="info" method="post">
        <fieldset>
            <legend>필수정보</legend>
            <ol>
                <li><label for="input">이름 : </label>
                    <input type="text" class="namebox" name="id" id="input" />
                </li>
        </fieldset>

        <fieldset>
            <legend>선택 정보</legend>
            <ol>
                <li>
                    <label for="da">생일 : </label>
                    <input type="date" name="datetime" id="dt">
                </li>
            </ol>
        </fieldset>
