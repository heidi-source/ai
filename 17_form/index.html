<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 태그</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h1>[폼 구성 요소 알아보기]</h1>
    <!-- 데이터를 전송하는 방식 기본값: GET방식 -->
    <!-- post방식 을 추천-->
    <form action="" name="login" method="post">
        <fieldset>
            <legend>로그인화면</legend>
            <ol>
                <li><label for="input">ID</label>
                    <input type="text" class="idbox" name="id" id="input" placeholder="아이디 또는 비밀번호" />
                </li>
                <li>
                    <!-- 장애자를 위한 코딩(웹접근성 코딩) -->
                    <label for="pwbox">PASSWORD</label>
                    <input type="password" name="ps" placeholder="비밀번호" id="pwbox">
                </li>
            </ol>
        </fieldset>
        <!-- 서버로 입력된 데이터를 전송 -->
        <input type="submit" value="로그인">
        <!-- 입력한 데이터 초기화 -->
        <input type="reset" value="다시입력">
    </form>

    <form action="" name="my" method="POST">
        <fieldset>
            <legend>개인신상정보</legend>
            <ul>
                <!-- 라이오버튼:하나의 요소만 선택할때 -->
                <!-- checkbox:여러개의 요소 선택 -->
                <li><input type="radio" name="gender" id="man"><label for="man">남자</label>
                    <input type="radio" name="gender" checked id="women"><label for="women">여자</label>
                </li>
                <li>
                    <label for="tour">여행</label>
                    <input type="checkbox" checked id="tour" name="chk" value="여행">
                    <label for="movie">영화</label>
                    <input type="checkbox" id="movie" name="chk2" value="영화">
                    <label for="book">독서</label>
                    <input type="checkbox" id="book" name="chk3" value="독서">
                </li>
                <li>
                    <label for="color">컬러선택</label>
                    <select name="colorlist" id="color">
                        <option value="">;;;;;색상선택;;;;;</option>
                        <option value="빨강">빨간색</option>
                        <option value="녹색">녹색</option>
                        <option value="파랑">파란색</option>
                    </select>
                </li>

                <li>
                    <label for="ms">MESSAGE</label>
                    <!-- 여러줄 입력할때 예:메세지창,비고란 -->
                    <textarea name="msg" id="ms" cols="60" rows="20">문의사항</textarea>
                </li>

                <li>
                    <label for="file">파일첨부</label>
                    <input type="file" name="file" id="file">
                </li>

                <li>
                    <label for="">색상선택</label>
                    <input type="color" name="color" id="col">
                </li>

                <li>
                    <label for="da">예약날짜</label>
                    <input type="date" name="datetime" id="dt">
                </li>

                <li>
                    <label for="time">예약시간</label>
                    <input type="time" name="time" id="time">
                </li>

                <li><label for="dt">날짜/시간예약</label>
                    <input type="datetime-local" name="datetime" id="dt">

                <li>
                    <label for="">리스트 목록(다중선택)</label>
                    <select name="multiselect" id="ml" multiple>
                        <option value="">사이즈를 선택하세요</option>
                        <option value="44">44</option>
                        <option value="55">55</option>
                        <option value="66">66</option>
                        <option value="77">77</option>
                    </select>
                </li>
                </li>

            </ul>
        </fieldset>

        <input type="submit" value="가입">
        <input type="reset" value="다시입력">
    </form>

</body>

</html>
