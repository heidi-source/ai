<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응용문제1</title>
    <link rel="stylesheet" href="./css/style2.css">
</head>

<body>
    <form action="" name="login" method="post">
        <fieldset>
            <legend>개인정보</legend>
            <ol>
                <li><label for="input" class="namespace">이름</label>
                    <input type="text" class="namebox" name="name" id="input" placeholder="" />
                </li>
                <li>
                    <!-- 장애자를 위한 코딩(웹접근성 코딩) -->
                    <label for="mail">메일주소</label>
                    <input type="mail" name="mail" placeholder="" id="mailbox">
                </li>
            </ol>
        </fieldset>
    </form>

    <form action="" name="my" method="POST">
        <fieldset>
            <legend>로그인 정보</legend>
            <ol>
                <li>
                    <label for="" class="idspace">아이디</label>
                    <input type="text" name="id" id="id">
                </li>
                <li>
                    <label for="">비밀번호</label>
                    <input type="password" name="ps" id="password">
                </li>
            </ol>



</body>

</html>
