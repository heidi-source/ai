<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객체: 도서</title>
</head>

<body>
    <script>
        let book = {
            title: "소년이 온다",
            author: "한강",
            price: "13500원",
            publishDate: "2014년 05월 19일",
            rating: 9.9
        };

        document.write(`책제목: ${book.title}<br>`);
        document.write(`저자이름: ${book.author}<br>`);
        document.write(`가격: ${book.price}<br>`);
        document.write(`출간일: ${book.publishDate}<br>`);
        document.write(`평점: ${book.rating}`);</script>
</body>

</html>
