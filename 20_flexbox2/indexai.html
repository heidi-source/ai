<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Model Layout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #dcdcdc;
    }

    .wrap {
      width: 100%;
    }

    .top-section {
      display: flex;
      width: 100%;
      height: 632px;
      background: #f6d400;
    }

    .left-menu {
      width: 85px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .menu-box {
      width: 85px;
      height: 86px;
      border: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #111;
    }

    .menu-box.red {
      background: #ff1f12;
    }

    .menu-box.orange {
      background: #f7a400;
    }

    .menu-box.yellow {
      background: #fffb00;
    }

    .content-area {
      flex: 1;
      background: #f6d400;
    }

    .bottom-section {
      width: 100%;
      height: 260px;
      background: #dcdcdc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-section">
      <div class="left-menu">
        <div class="menu-box red">빨</div>
        <div class="menu-box orange">주</div>
        <div class="menu-box yellow">노</div>
      </div>
      <div class="content-area"></div>
    </div>

    <div class="bottom-section"></div>
  </div>
</body>
</html>
