<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if문 제3형식 (다중if)</title>
</head>

<body>
    <script>
        // if(조건식){
        //     참일때 실행
        // }else if(조건식){
        //     참일때 실행
        // }else if(조건식){
        //     참일때 실행
        // }else if(조건식){
        //     참일때 실행
        // }else{
        //     거짓일때 실행
        // } 

        // 외부로부터 data를 입력받아 국어,영어,수학,컴퓨터
        // 총점과 평균을 구하고, 평균이 90점 이상이면 '수'      80점이상이면 '우'   70점이상이면 '미'   60점이상이면 '양'   나머지는 '가'

        let kor = prompt("국어점수를 입력하세요?")
        let eng = prompt("영어점수를 입력하세요?")
        let mat = prompt("수학점수를 입력하세요?")
        let com = prompt("컴퓨터점수를 입력하세요?")
        // 총점 구하기
        let tot = Number(kor) + Number(eng) + Number(mat) + Number(com);
        // 평균 구하기 [+,-,*,/,**(제곱),%(나머지)]
        let avg = tot / 4
        // 평점 구하기
        let remark = "";
        // 학점 구하기
        let grade = "";

        // if
        if (avg >= 90) {
            remark = "수";
        } else if (avg >= 80) {
            remark = "우";
        } else if (avg >= 70) {
            remark = "미";
        } else if (avg >= 60) {
            remark = "양";
        } else {
            remark = "가";
        }

        if (avg >= 95) {
            grade = "A+"
        } else if (avg >= 90) {
            grade = "A"
        } else if (avg >= 85) {
            grade = "B+"
        } else if (avg >= 80) {
            grade = "B"
        } else if (avg >= 75) {
            grade = "C+"
        } else if (avg >= 70) {
            grade = "C"
        } else if (avg >= 65) {
            grade = "D+"
        } else if (avg >= 60) {
            grade = "D"
        } else {
            grade = "F"
        }


        document.write(`국어점수 = ${kor} <br>`);
        document.write(`영어점수 = ${eng} <br>`);
        document.write(`수학점수 = ${mat} <br>`);
        document.write(`컴퓨터점수 = ${com} <br>`);
        document.write(`총점수 = ${tot} <br>`);
        document.write(`평균 = ${avg} <br>`);
        document.write(`평점 = ${remark} <br>`);
        document.write(`학점 = ${grade} <br>`);
    </script>

</body>

</html>
