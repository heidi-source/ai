<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동영상 삽입</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h1>홍보/마켓팅 동영상</h1>
    <hr>
    <!-- 이미지삽입 -->
    <div class="imgbox">
        <img src="./imgs/end.png" alt="샘플이미지">

    </div>
    <!-- 동영상 -->
    <div class="movie_wrap">
        <div class="movie">
            <!-- 동영상태그(재생가능) -->
            <!-- 반복실행: loop -->
            <video autoplay muted loop controls="true">
                <source src="./movie/sample1.mp4" type="video/mp4">
            </video>
        </div>


        <div class="movie">
            <video autoplay muted loop>
                <source src="./movie/sample2.mp4" type="video/mp4">
            </video>

        </div>


        <div class="movie">
            <video autoplay muted loop>
                <source src="./movie/sample3.mp4" type="video/mp4">
            </video>
        </div>

        <div class="movie">
            <video autoplay muted loop>
                <source src="./movie/sample4.mp4" type="video/mp4">
            </video>
        </div>
        </div">

        <!-- 유튜브 영상 삽입 -->
        <div class="youtube">
            <iframe src="iframe width="560" height="315" src="https://www.youtube.com/embed/8pn7MgpY4Nc?si=_DJ1uGhQma73c28E" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>" frameborder="0"></iframe>

        </div>
</body>

</html>
