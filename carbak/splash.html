<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CAR BAK Splash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #fff;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: #fff;
        }

        .logo-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 48px;
            animation: fadeIn 0.8s ease forwards;
        }

        .logo {
            width: min(72vw, 280px);
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .loading-area {
            width: min(72vw, 240px);
            animation: fadeIn 1s ease forwards;
        }

        .loading-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            overflow: hidden;
        }

        .loading-bar {
            width: 0;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #2f7bff 0%, #52a8ff 100%);
            animation: loading 3s linear forwards;
        }

        .loading-text {
            margin-top: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            letter-spacing: 0.08em;
        }

        @keyframes loading {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 768px) {
            .splash {
                max-width: 430px;
                border-left: 1px solid rgba(255, 255, 255, 0.06);
                border-right: 1px solid rgba(255, 255, 255, 0.06);
            }
        }
    </style>
</head>

<body>
    <div class="splash">
        <div class="logo-wrap">
            <img src="./imgs/logo.png" alt="CAR BAK 로고" class="logo" />
        </div>

        <div class="loading-area">
            <div class="loading-track">
                <div class="loading-bar"></div>
            </div>
            <p class="loading-text">LOADING...</p>
        </div>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = './workflow.html';
        }, 3000);
    </script>
</body>

</html>
