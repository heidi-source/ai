<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CAR BAK Splash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: #fff;
        }

        .logo-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 48px;
            animation: fadeIn 0.8s ease forwards;
        }

        .logo {
            width: min(72vw, 280px);
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .loading-area {
            width: min(72vw, 240px);
            animation: fadeIn 1s ease forwards;
        }

        .loading-track {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            overflow: hidden;
        }

        .loading-bar {
            width: 0;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #2f7bff 0%, #52a8ff 100%);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
        }

        .progress-percent {
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .loading-text {
            margin-top: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            letter-spacing: 0.08em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 768px) {
            .splash {
                max-width: 430px;
                border-left: 1px solid rgba(255, 255, 255, 0.06);
                border-right: 1px solid rgba(255, 255, 255, 0.06);
            }
        }
    </style>
</head>

<body>
    <div class="splash">
        <div class="logo-wrap">
            <img src="./imgs/logo.png" alt="CAR BAK 로고" class="logo" />
        </div>

        <div class="loading-area">
            <div class="loading-track">
                <div class="loading-bar" id="loadingBar">
                    <span class="progress-percent" id="progressText">0%</span>
                </div>
            </div>
            <p class="loading-text">LOADING...</p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('loadingBar');
        const progressText = document.getElementById('progressText');

        let progress = 0;
        const duration = 3000;
        const intervalTime = 30;
        const step = 100 / (duration / intervalTime);

        const loadingInterval = setInterval(function () {
            progress += step;

            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);

                setTimeout(function () {
                    window.location.href = './workflow.html';
                }, 100);
            }

            const percent = Math.floor(progress);
            loadingBar.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }, intervalTime);
    </script>
</body>

</html>
