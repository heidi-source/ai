<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CARBAK 메인 페이지</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #efefef;
            --primary: #5b74bb;
            --primary-dark: #4f66a8;
            --text: #4b4b4b;
            --muted: #b7b7b7;
            --card: #ffffff;
            --line: #d8dce8;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
            background: #222;
            color: var(--text);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 812px;
            background: var(--bg);
            overflow: hidden;
        }

        .screen-scroll {
            width: 100%;
            height: calc(100% - 78px);
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: 32px;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 278px;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 15%),
                linear-gradient(180deg, #cab7dc 0%, #e3ad8f 42%, #d8c7a1 78%, #b9c39e 100%);
        }

        .hero svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .hero-copy {
            position: absolute;
            left: 24px;
            top: 18px;
            z-index: 2;
        }

        .logo {
            font-size: 34px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: 6px;
            color: #334f8b;
            margin-bottom: 18px;
        }

        .hero-title {
            font-size: 18px;
            font-weight: 700;
            color: #eaf2ff;
            text-shadow: 0 1px 2px rgba(41, 59, 112, 0.55);
        }

        .content {
            padding: 22px 16px 0;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .bookmark-btn {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .bookmark-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--primary);
            fill: none;
            stroke-width: 2;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px 8px;
        }

        .category-item {
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            cursor: pointer;
        }

        .category-icon {
            font-size: 38px;
            line-height: 1;
            filter: saturate(1.05);
        }

        .category-label {
            font-size: 13px;
            color: #bdbdbd;
            font-weight: 600;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 22px;
        }

        .quick-btn {
            height: 52px;
            border: none;
            border-radius: 10px;
            background: #b5bfdf;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .quick-btn svg {
            width: 18px;
            height: 18px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
        }

        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px 16px;
            margin-bottom: 20px;
            align-items: start;
        }

        .spot-card,
        .wide-card {
            width: 100%;
            max-width: 100%;
            margin: 8px auto 0;
            border: none;
            padding: 0;
            background: transparent;
            cursor: pointer;
            text-align: left;
            display: block;
        }

        .spot-thumb,
        .wide-thumb {
            width: 100%;
            height: 158px;
            display: block;
            margin: 0 auto;
            border-radius: 0;
            object-fit: cover;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .spot-thumb {
            width: 100%;
            height: 178px;
            display: block;
            border-radius: 0;
            object-fit: cover;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .wide-thumb {
            height: 158px;
        }

        .bottom-panel {
            padding: 6px 16px 0;
        }

        .location-box {
            margin-top: 6px;
            font-size: 17px;
            line-height: 1.6;
            color: #c7c7c7;
            font-weight: 700;
            min-height: 56px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 22px;
        }

        .primary-btn,
        .ghost-btn {
            height: 48px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .primary-btn {
            border: none;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 16px rgba(91, 116, 187, 0.18);
        }

        .ghost-btn {
            background: #fff;
            color: #666;
            border: 1.5px solid #6e83cd;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 92px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(41, 52, 89, 0.92);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 999px;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
            z-index: 30;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .tabbar {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 78px;
            background: #ffffff;
            border-top: 1px solid #dfe3ee;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            z-index: 40;
        }

        .tab-btn {
            height: 100%;
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #7f8798;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-btn.active {
            color: var(--primary);
        }



        @media (max-width: 360px) {
            .logo {
                font-size: 30px;
            }

            .hero-title {
                font-size: 16px;
            }

            .category-icon {
                font-size: 34px;
            }

            .quick-actions {
                gap: 10px;
            }
        }
    </style>
</head>

                    <div class="ranking-grid" id="rankingGrid">
                        <button class="spot-card" data-location="알프스 감성 차박 포인트">
                            <img class="spot-thumb"
                                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"
                                alt="산 아래 노란 캠핑카" />
                        </button>
                        <button class="spot-card" data-location="숲속 야간 캠핑 스팟">
                            <img class="spot-thumb"
                                src="https://images.unsplash.com/photo-1504851149312-7a075b496cc7?auto=format&fit=crop&w=800&q=80"
                                alt="숲속 텐트와 야간 조명" />
                        </button>
                        <button class="spot-card" data-location="해안 절벽 뷰 포인트">
                            <img class="spot-thumb"
                                src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
                                alt="초원과 바다 절경" />
                        </button>
                        <button class="spot-card" data-location="가을 호수 브릿지 포인트">
                            <img class="spot-thumb"
                                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80"
                                alt="가을 호수와 다리 풍경" />
                        </button>
                    </div>

                    <button class="wide-card" data-location="로드트립 감성 차박 루트">
                        <img class="wide-thumb"
                            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80"
                            alt="숲길을 가르는 도로 풍경" />
                    </button>
                </section>
            </div>

            <section class="bottom-panel section">
                <div class="section-header">
                    <h2 class="section-title">테마별 카테고리</h2>
                    <button class="bookmark-btn" id="bookmarkBtn" aria-label="북마크 저장">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 4h10a1 1 0 0 1 1 1v15l-6-3-6 3V5a1 1 0 0 1 1-1Z"></path>
                        </svg>
                    </button>
                </div>

                <p class="location-box" id="selectedLocation">강원도 원주시 치악면 치악산 1번지</p>

                <div class="action-row">
                    <button class="primary-btn" id="findRoadBtn">길찾기</button>
                    <button class="ghost-btn" id="clearBtn">해제하기</button>
                </div>
            </section>

        </div>

        <div class="toast" id="toast"></div>

        <nav class="tabbar" aria-label="하단 탭바">
            <button class="tab-btn active" data-tab="home">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 10.5 12 3l9 7.5" />
                    <path d="M5 9.5V20h14V9.5" />
                </svg>
                <span>홈</span>
            </button>
            <button class="tab-btn" data-tab="search">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="6.5" />
                    <path d="m16 16 4 4" />
                </svg>
                <span>검색</span>
            </button>
            <button class="tab-btn" data-tab="meeting">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" />
                    <circle cx="9.5" cy="8" r="3" />
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16.5 5.2a3 3 0 0 1 0 5.6" />
                </svg>
                <span>모임</span>
            </button>
            <button class="tab-btn" data-tab="live">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="6" width="13" height="12" rx="2" />
                    <path d="m16 10 5-3v10l-5-3" />
                </svg>
                <span>LIVE</span>
            </button>
            <button class="tab-btn" data-tab="my">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.5" />
                    <path d="M5 20a7 7 0 0 1 14 0" />
                </svg>
                <span>MY</span>
            </button>
        </nav>
    </main>

    <script>
        const selectedLocation = document.getElementById('selectedLocation');
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const clearBtn = document.getElementById('clearBtn');
        const findRoadBtn = document.getElementById('findRoadBtn');
        const toast = document.getElementById('toast');

        let currentSelection = '강원도 원주시 치악면 치악산 1번지';
        let isBookmarked = false;
        let toastTimer;

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }

        function updateBookmarkIcon() {
            const path = bookmarkBtn.querySelector('path');
            path.setAttribute('fill', isBookmarked ? '#5b74bb' : 'none');
        }

        document.querySelectorAll('[data-location]').forEach((item) => {
            item.addEventListener('click', () => {
                currentSelection = item.dataset.location;
                selectedLocation.textContent = currentSelection;
                showToast(`${currentSelection} 선택됨`);
            });
        });

        document.querySelectorAll('.category-item').forEach((item) => {
            item.addEventListener('click', () => {
                const name = item.dataset.name;
                selectedLocation.textContent = `${name} 테마 추천 차박지를 불러오는 중...`;
                showToast(`${name} 카테고리 선택`);
            });
        });

        document.querySelectorAll('.quick-btn').forEach((button) => {
            button.addEventListener('click', () => {
                const map = {
                    coupon: '쿠폰 페이지로 이동합니다.',
                    event: '이벤트 페이지로 이동합니다.',
                    benefit: '혜택 페이지로 이동합니다.'
                };
                showToast(map[button.dataset.action]);
            });
        });

        bookmarkBtn.addEventListener('click', () => {
            isBookmarked = !isBookmarked;
            updateBookmarkIcon();
            showToast(isBookmarked ? '북마크에 저장했어요.' : '북마크를 해제했어요.');
        });

        clearBtn.addEventListener('click', () => {
            currentSelection = '강원도 원주시 치악면 치악산 1번지';
            selectedLocation.textContent = currentSelection;
            isBookmarked = false;
            updateBookmarkIcon();
            showToast('선택을 초기화했어요.');
        });

        findRoadBtn.addEventListener('click', () => {
            const query = encodeURIComponent(currentSelection);
            window.open(`https://map.naver.com/p/search/${query}`, '_blank');
        });

        updateBookmarkIcon();

        document.querySelectorAll('.tab-btn').forEach((button) => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach((tab) => tab.classList.remove('active'));
                button.classList.add('active');

                const label = button.querySelector('span').textContent;
                showToast(`${label} 탭으로 이동합니다.`);
            });
        });
    </script>
</body>

</html>
