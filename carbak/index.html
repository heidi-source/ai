<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camping Search Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- 카카오 지도 API 연동 (JavaScript 키 필요) -->
    <!-- 실제 사용 시 appkey=뒤에 발급받은 키를 입력하세요 -->
    <script type="text/javascript"
        src="http://dapi.kakao.com/v2/maps/sdk.js?appkey=dbb3596ff60232e1f6e5dbf838c2b4fa"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .search-box-container {
            border: 1.5px solid #7c8db5;
            border-radius: 10px;
            background: #f0f4ff;
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            margin: 20px;
        }

        .search-tag {
            background-color: #7c8db5;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .facility-badge {
            width: 58px;
            height: 62px;
            border-radius: 8px;
            border: 1.5px solid #7c8db5;
            background-color: #f0f4ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .facility-badge i {
            font-size: 22px;
            color: #4a5a8a;
        }

        .facility-badge span {
            font-size: 11px;
            font-weight: 700;
            color: #4a5a8a;
        }

        .review-grid-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 24px;
        }

        .bottom-nav {
            border-top: 1px solid #f0f0f0;
            background: white;
            height: 80px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #b0b0b0;
            flex: 1;
            cursor: pointer;
        }

        .nav-item.active {
            color: #5c6bc0;
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .profile-gradient {
            background: linear-gradient(135deg, #7c8db5 0%, #4a5a8a 100%);
        }

        .level-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        .page {
            display: none;
            background: white;
            min-height: 100vh;
            width: 100%;
        }

        .page.active {
            display: block;
        }

        #map {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            margin-top: 16px;
            border: 1px solid #eee;
        }

        .loading-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative">

    <!-- 1. 검색 메인 페이지 (홈) -->
    <div id="page-search" class="page active pt-6">
        <div class="flex items-center gap-2 pr-5">
            <div class="search-box-container flex-1">
                <input type="text" id="search-input" placeholder="지역 또는 키워드를 입력하세요"
                    class="bg-transparent border-none outline-none flex-1 text-[15px] text-gray-700">
            </div>
            <i id="btn-get-location"
                class="fas fa-map-marked-alt text-[#4a5a8a] text-2xl cursor-pointer hover:scale-110 transition-transform"
                onclick="getCurrentLocation()"></i>
        </div>

        <div class="px-5 mt-4">
            <h3 class="font-bold text-gray-800 mb-4">최근 검색어</h3>
            <div class="flex gap-3">
                <span class="search-tag" style="opacity: 0.8;" onclick="handleSearch('서울')">서울</span>
                <span class="search-tag" style="opacity: 0.8;" onclick="handleSearch('단양')">단양</span>
            </div>
        </div>

        <div class="px-5 mt-10">
            <h3 class="font-bold text-gray-800 mb-4">인기 검색어</h3>
            <div class="flex flex-wrap gap-3">
                <span class="search-tag" onclick="handleSearch('바다')">바다</span>
                <span class="search-tag" onclick="handleSearch('노지캠핑')">노지캠핑</span>
                <span class="search-tag" onclick="handleSearch('반려동물 동반')">반려동물 동반</span>
            </div>
        </div>
    </div>

    <!-- 2. 검색 결과 리스트 -->
    <div id="page-results" class="page pb-24">
        <div class="px-5 py-4 flex items-center border-b border-gray-50">
            <i class="fas fa-chevron-left text-xl cursor-pointer" onclick="showPage('search')"></i>
            <span class="ml-4 font-bold text-lg">검색 결과</span>
        </div>
        <div id="results-list" class="flex flex-col"></div>
    </div>

    <!-- 3. 상세 페이지 -->
    <div id="page-detail" class="page pb-24">
        <div class="relative h-80">
            <img id="detail-main-img" src="" class="w-full h-full object-cover">
            <button
                class="absolute top-5 left-5 bg-white/40 backdrop-blur-md w-10 h-10 rounded-full flex items-center justify-center text-white"
                onclick="handleBack()">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <div class="px-6 py-8">
            <div class="flex justify-between items-start">
                <div>
                    <h2 id="detail-title" class="text-[26px] font-bold text-gray-900 leading-tight"></h2>
                    <p id="detail-addr" class="text-gray-500 text-[15px] font-medium mt-1"></p>
                </div>
                <button id="detail-fav-btn" class="mt-2">
                    <i id="detail-fav-icon" class="far fa-bookmark text-2xl text-gray-800"></i>
                </button>
            </div>

            <div id="map"></div>

            <div class="flex gap-3 mt-8">
                <div class="facility-badge">
                    <i class="fas fa-restroom"></i>
                    <span>화장실</span>
                </div>
                <div class="facility-badge">
                    <i class="fas fa-shopping-basket"></i>
                    <span>편의점</span>
                </div>
            </div>

            <div class="mt-8">
                <h4 class="text-gray-900 font-bold mb-2">키워드</h4>
                <div class="text-[#7c8db5] font-medium text-[15px]">#수도권 #피크닉 #반려견과함께</div>
            </div>

            <div class="mt-12">
                <h4 class="text-[#4a5a8a] font-bold text-[19px] mb-6">방문자 후기</h4>
                <div class="grid grid-cols-2 gap-4">
                    <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=300"
                        class="review-grid-img">
                    <img src="https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?auto=format&fit=crop&w=300"
                        class="review-grid-img">
                    <img src="https://images.unsplash.com/photo-1510784722466-f2aa9c52fff6?auto=format&fit=crop&w=300"
                        class="review-grid-img">
                    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=300"
                        class="review-grid-img">
                </div>
            </div>
        </div>
    </div>

    <!-- 4. MY 페이지 -->
    <div id="page-my" class="page pb-24">
        <div class="px-5 py-6">
            <div class="profile-gradient rounded-[24px] p-6 text-white mb-8 shadow-lg">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-16 h-16 rounded-full border-2 border-white/50 p-1 overflow-hidden bg-white/20">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150"
                            alt="profile" class="w-full h-full object-cover rounded-full">
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="font-bold text-xl">캠핑마스터 킴</span>
                            <span class="level-badge">LV. 12</span>
                        </div>
                        <p class="text-white/80 text-[13px]">주말마다 떠나는 노지 캠퍼 🏕️</p>
                    </div>
                </div>
                <div class="w-full bg-white/20 h-1.5 rounded-full mb-1">
                    <div class="bg-white w-[70%] h-full rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-white/70 font-medium">
                    <span>다음 레벨까지 320 XP</span>
                    <span>70%</span>
                </div>
            </div>

            <div class="flex justify-around text-center mb-10">
                <div>
                    <p class="text-[11px] text-gray-400 font-bold uppercase mb-1">즐겨찾기</p>
                    <p id="fav-count" class="text-xl font-bold text-[#4a5a8a]">0</p>
                </div>
                <div class="w-[1px] h-8 bg-gray-100 self-center"></div>
                <div>
                    <p class="text-[11px] text-gray-400 font-bold uppercase mb-1">내 리뷰</p>
                    <p class="text-xl font-bold text-[#4a5a8a]">8</p>
                </div>
                <div class="w-[1px] h-8 bg-gray-100 self-center"></div>
                <div>
                    <p class="text-[11px] text-gray-400 font-bold uppercase mb-1">방문한 곳</p>
                    <p class="text-xl font-bold text-[#4a5a8a]">24</p>
                </div>
            </div>

            <div class="px-1">
                <h3 class="font-bold text-lg text-gray-900 mb-4 flex items-center justify-between">
                    내 즐겨찾기
                    <span class="text-[12px] text-gray-400 font-medium">전체보기</span>
                </h3>
                <div id="bookmark-list-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- 하단 내비게이션 탭바 -->
    <nav class="fixed bottom-0 max-w-md w-full bottom-nav flex justify-around items-center">
        <!-- 홈 버튼: 클릭 시 index.html로 하이퍼링크 처리 -->
        <div class="nav-item" onclick="location.href='main2.html'">
            <i class="fas fa-campground"></i>
            <span>홈</span>
        </div>
        <div class="nav-item active" id="nav-search" onclick="showPage('search')">
            <i class="fas fa-search"></i>
            <span>검색</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-user-friends"></i>
            <span>모임</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-play-circle"></i>
            <span>LIVE</span>
        </div>
        <div class="nav-item" id="nav-my" onclick="showMyPage()">
            <i class="far fa-user"></i>
            <span>MY</span>
        </div>
    </nav>

    <script>
        let lastPage = 'search';
        let currentItemIndex = -1;
        let kakaoMap = null;
        let marker = null;

        let currentData = [
            { id: 1, facltNm: "양화 한강공원", addr1: "서울 마포구 양원동 205-4", img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=600", dist: "11.1 km" },
            { id: 2, facltNm: "광교 호수공원", addr1: "수원시 영통구 광교호수로 165", img: "https://images.unsplash.com/photo-1473116763249-2faaef81ccda?auto=format&fit=crop&w=600", dist: "40.5 km" },
            { id: 3, facltNm: "경안천습지생태공원", addr1: "경기 광주시 퇴촌면 정지리 525", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600", dist: "11.1 km" },
            { id: 4, facltNm: "한강중앙공원", addr1: "경기 김포시 초당로 40", img: "https://images.unsplash.com/photo-1532339142463-fd0a8979791a?auto=format&fit=crop&w=600", dist: "11.1 km" }
        ];

        let bookmarkIds = new Set([1, 2]);

        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.5665, 126.9780),
                level: 3
            };
            kakaoMap = new kakao.maps.Map(container, options);
            marker = new kakao.maps.Marker({
                position: kakaoMap.getCenter()
            });
            marker.setMap(kakaoMap);
        }

        function updateMapLocation(address, title) {
            if (!window.kakao || !window.kakao.maps) return;
            if (!kakaoMap) initMap();

            const geocoder = new kakao.maps.services.Geocoder();
            geocoder.addressSearch(address, function (result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                    marker.setPosition(coords);
                    kakaoMap.setCenter(coords);
                    kakaoMap.relayout();
                }
            });
        }

        function getCurrentLocation() {
            const searchInput = document.getElementById('search-input');
            const locationBtn = document.getElementById('btn-get-location');

            if (!navigator.geolocation) {
                alert("이 브라우저에서는 위치 서비스를 지원하지 않습니다.");
                return;
            }

            locationBtn.classList.add('loading-spin');
            searchInput.value = "위치 정보를 가져오는 중...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const geocoder = new kakao.maps.services.Geocoder();
                    const coord = new kakao.maps.LatLng(lat, lon);

                    geocoder.coord2Address(coord.getLng(), coord.getLat(), (result, status) => {
                        locationBtn.classList.remove('loading-spin');
                        if (status === kakao.maps.services.Status.OK) {
                            const addr = result[0].address.address_name;
                            searchInput.value = addr;
                            handleSearch(addr);
                        } else {
                            searchInput.value = "";
                            alert("주소를 찾을 수 없습니다.");
                        }
                    });
                },
                (error) => {
                    locationBtn.classList.remove('loading-spin');
                    searchInput.value = "";
                    alert("위치 정보를 가져오는데 실패했습니다.");
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }

        function showPage(pageId) {
            const current = document.querySelector('.page.active');
            if (current) lastPage = current.id.replace('page-', '');

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            if (pageId === 'search' || pageId === 'results') document.getElementById('nav-search').classList.add('active');
            if (pageId === 'my') document.getElementById('nav-my').classList.add('active');

            if (pageId === 'detail' && kakaoMap) {
                setTimeout(() => kakaoMap.relayout(), 100);
            }

            window.scrollTo(0, 0);
        }

        function handleBack() { showPage(lastPage); }

        function toggleBookmark(e, id) {
            e.stopPropagation();
            if (bookmarkIds.has(id)) {
                bookmarkIds.delete(id);
            } else {
                bookmarkIds.add(id);
            }
            const activePage = document.querySelector('.page.active').id;
            if (activePage === 'page-results') renderResultsList();
            if (activePage === 'page-my') showMyPage();
            if (currentItemIndex !== -1 && currentData[currentItemIndex].id === id) {
                updateDetailFavUI(id);
            }
        }

        function renderResultsList() {
            const container = document.getElementById('results-list');
            container.innerHTML = currentData.map((item, idx) => {
                const isFav = bookmarkIds.has(item.id);
                return `
                    <div class="flex p-5 gap-4 items-center active:bg-gray-50 border-b border-gray-50" onclick="showDetail(${idx})">
                        <img src="${item.img}" class="w-24 h-24 object-cover rounded-[24px]">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-[17px] text-gray-800 truncate pr-2">${item.facltNm}</h4>
                                <button onclick="toggleBookmark(event, ${item.id})">
                                    <i class="${isFav ? 'fas fa-bookmark text-[#5c6bc0]' : 'far fa-bookmark text-gray-400'} text-lg"></i>
                                </button>
                            </div>
                            <p class="text-[13px] text-gray-500 mt-0.5 truncate">${item.addr1}</p>
                        </div>
                        <div class="text-[#7c8db5] text-[12px] font-bold self-end mb-1">${item.dist}</div>
                    </div>
                `;
            }).join('');
        }

        function handleSearch(keyword) {
            renderResultsList();
            showPage('results');
        }

        function showDetail(index) {
            currentItemIndex = index;
            const item = currentData[index];
            document.getElementById('detail-main-img').src = item.img;
            document.getElementById('detail-title').innerText = item.facltNm;
            document.getElementById('detail-addr').innerText = item.addr1;
            updateDetailFavUI(item.id);
            updateMapLocation(item.addr1, item.facltNm);
            const favBtn = document.getElementById('detail-fav-btn');
            favBtn.onclick = (e) => toggleBookmark(e, item.id);
            showPage('detail');
        }

        function updateDetailFavUI(id) {
            const icon = document.getElementById('detail-fav-icon');
            if (bookmarkIds.has(id)) {
                icon.className = 'fas fa-bookmark text-2xl text-[#5c6bc0]';
            } else {
                icon.className = 'far fa-bookmark text-2xl text-gray-800';
            }
        }

        function showMyPage() {
            const container = document.getElementById('bookmark-list-container');
            const bookmarkedItems = currentData.filter(item => bookmarkIds.has(item.id));
            document.getElementById('fav-count').innerText = bookmarkedItems.length;
            if (bookmarkedItems.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10 text-sm">즐겨찾기한 캠핑장이 없습니다.</p>`;
            } else {
                container.innerHTML = bookmarkedItems.map((item) => `
                    <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-[20px]" onclick="showDetail(${currentData.indexOf(item)})">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-[16px]">
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-gray-800 text-[15px] truncate">${item.facltNm}</h4>
                            <p class="text-gray-500 text-[12px] truncate">${item.addr1}</p>
                        </div>
                        <button onclick="toggleBookmark(event, ${item.id})">
                            <i class="fas fa-bookmark text-[#5c6bc0] text-lg"></i>
                        </button>
                    </div>
                `).join('');
            }
            showPage('my');
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch(e.target.value);
        });

        window.onload = function () {
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(() => {
                    initMap();
                });
            }
        };
    </script>
</body>

</html>
