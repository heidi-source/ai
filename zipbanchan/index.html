<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레이아웃 구현</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-width: 1200px;
      background: #e6e6e6;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .wrap { width: 100%; }

    /* header */
    header {
      width: 1200px;
      height: 150px;
      margin: 0 auto;
      background: #f0009a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0;
    }

    .header-box {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .h1 {
      width: 350px;
      height: 60px;
      background: #ffb3da;
    }

    .h2 {
      width: 350px;
      height: 70px;
      background: #ff80c1;
    }

    .h3 {
      width: 350px;
      height: 90px;
      background: #ff4da8;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
    }

    .h3-child {
      width: 100%;
      height: 40px;
      background: #ff99cc;
    }

    .h1 { background: #ffb3da; }
    .h2 { background: #ff80c1; }
    .h3 { background: #ff4da8; }

    /* banner */
    .banner {
      width: 100%;
      height: 450px;
      background: #08b287;
    }

    /* main */
    main {
      width: 1200px;
      min-height: 600px;
      margin: 0 auto;
      background: #ffffff;
    }

    .box1, .box2, .box3, .box4, .box5 { width: 100%; }

    .box1 { height: 1000px; background: #ffe0e0; }
    .box2 {
      min-height: 600px;
      background: #fff1b8;
      padding: 40px 0;
    }
    .box3 { height: 1000px; background: #d9f7ff; }
    .box4 { height: 200px; background: #d9ffd6; }
    .box5 { height: 1000px; background: #eadbff; }

    .content-box {
      width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .section-title {
      text-align: center;
      margin-bottom: 16px;
    }

    .section-title h2 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .section-title p {
      font-size: 14px;
      font-weight: 700;
      color: #7b736d;
      line-height: 1.4;
    }

    .card-list {
      display: flex;
      gap: 16px;
      flex-wrap: nowrap;
    }

    .card {
      width: 280px;
      flex: 0 0 280px;
    }

    .card-thumb {
      position: relative;
      width: 280px;
      height: 380px;
      background: #f3f0eb;
      overflow: hidden;
    }

    .thumb-circle {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #d92b23;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .thumb-bag {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(95, 95, 95, 0.9);
      z-index: 2;
    }

    .thumb-bag::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 16px;
      width: 20px;
      height: 14px;
      border: 3px solid #fff;
      border-radius: 3px;
      box-sizing: border-box;
    }

    .thumb-bag::after {
      content: "";
      position: absolute;
      left: 15px;
      top: 8px;
      width: 12px;
      height: 10px;
      border: 3px solid #fff;
      border-bottom: 0;
      border-radius: 10px 10px 0 0;
      box-sizing: border-box;
    }

    /* placeholder image */
    .thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      background: #f3f0eb;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f3f0eb 0%, #e2ddd6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #999;
    }


    .plate.two {
      background: radial-gradient(circle at 50% 40%, #7ab158 0%, #4e7c35 16%, #d45c34 17%, #d45c34 28%, #9a552c 29%, #9a552c 36%, #4e7c35 37%, #4e7c35 46%, #d45c34 47%, #d45c34 59%, #3d3d3d 60%, #272727 100%);
    }

    .plate.three {
      background: radial-gradient(circle at 50% 50%, #8d5b40 0%, #8d5b40 22%, #b7815b 23%, #b7815b 37%, #71513d 38%, #71513d 48%, #9a6b47 49%, #9a6b47 59%, #383838 60%, #2d2d2d 100%);
    }

    .plate.four {
      width: 240px;
      height: 220px;
      border-radius: 48% 52% 50% 50% / 48% 48% 52% 52%;
      background: #f6f4f0;
      box-shadow: inset 0 0 0 3px #e7e2da;
    }

    .rice-ball,
    .side-dish {
      position: absolute;
      background: #d5c7a6;
      border-radius: 50%;
    }

    .rice-ball.one { width: 88px; height: 88px; left: 150px; top: 72px; }
    .rice-ball.two { width: 92px; height: 92px; left: 96px; top: 172px; }
    .rice-ball.three { width: 110px; height: 96px; left: 190px; top: 160px; background: #b7bdb0; }
    .side-dish.one { width: 72px; height: 72px; left: 120px; top: 114px; background: #d89874; }
    .side-dish.two { width: 74px; height: 74px; left: 102px; top: 208px; background: #a97b5c; }

    .card-info {
      padding: 14px 10px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      margin-bottom: 0;
      min-height: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 21px;
      padding: 0 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .badge.red {
      background: #f7d7d7;
      color: #da3f3f;
    }

    .badge.yellow {
      background: #f4c96a;
      color: #8a5a00;
    }

    .card-name {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 0;
      color: #111;
      min-height: 0;
    }

    .card-desc {
      font-size: 14px;
      line-height: 1.2;
      color: #7a746f;
      margin-bottom: 0;
      min-height: 0;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 0;
    }

    .discount {
      color: #df2c2c;
      font-size: 16px;
      font-weight: 600;
    }

    .price {
      color: #111;
      font-size: 16px;
      font-weight: 600;
    }

    .origin-price {
      color: #b4aca6;
      font-size: 14px;
      text-decoration: line-through;
      margin-top: -2px;
    }

    /* footer */
    footer {
      width: 1200px;
      height: 200px;
      margin: 0 auto;
      background: #5b00d6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-box {
      height: 125px;
      background: #7d4dff;
    }

    footer .footer-box:nth-child(1) {
      width: 350px;
    }

    footer .footer-box:nth-child(2) {
      width: 775px;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header>
      <div class="header-box h1"></div>
      <div class="header-box h2"></div>
      <div class="header-box h3">
        <div class="h3-child"></div>
        <div class="h3-child"></div>
      </div>
    </header>

    <section class="banner"></section>

    <main>
      <div class="box1"></div>

      <div class="box2">
        <div class="content-box">
          <div class="section-title">
            <h2>집밥 한 끼</h2>
            <p>치솟는 물가엔 현명한 소비</p>
          </div>

          <div class="card-list">
            <article class="card">
              <div class="card-thumb">
                <div class="thumb-circle">11%</div>
                <img src="./img/imgi_183_1339_ZIP_P_0088_T.jpg" class="thumb-img" alt="상품 이미지">
                <div class="thumb-bag"></div>
              </div>
              <div class="card-info">
                
                <h3 class="card-name">메추리알 간장조림</h3>
                
                <div class="price-row">
                  <span class="discount">11%</span>
                  <span class="price">3400원</span>
                </div>
                <p class="origin-price">3,800원</p>
              </div>
            </article>

            <article class="card">
              <div class="card-thumb">
                <div class="thumb-circle">11%</div>
                <img src="./img/imgi_184_1379_ZIP_P_1049_T_RE.jpg" class="thumb-img" alt="상품 이미지">
                <div class="thumb-bag"></div>
              </div>
              <div class="card-info">
                <div class="badge-row">
                  <span class="badge red">신제품</span>
                </div>
                <h3 class="card-name">한우야채카레</h3>
                <p class="card-desc">담백하고 부드러운 야채들로 풍성하게</p>
                <div class="price-row">
                  <span class="discount">12%</span>
                  <span class="price">3800원</span>
                </div>
                <p class="origin-price">4,300원</p>
              </div>
            </article>

            <article class="card">
              <div class="card-thumb">
                <div class="thumb-circle">11%</div>
                <img src="./img/imgi_185_1337_ZIP_P_0090_T.jpg" class="thumb-img" alt="상품 이미지">
                <div class="thumb-bag"></div>
              </div>
              <div class="card-info">
                <div class="badge-row">
                  <span class="badge red">신제품</span>
                  <span class="badge yellow">맵지않음</span>
                </div>
                <h3 class="card-name">[원더스프] 한우 소고기 미역국</h3>
                <p class="card-desc">영양 가득 든든한 우리 어린이 미역국</p>
                <div class="price-row">
                  <span class="discount">11%</span>
                  <span class="price">4700원</span>
                </div>
                <p class="origin-price">5,300원</p>
              </div>
            </article>

            <article class="card">
              <div class="card-thumb">
                <div class="thumb-circle">11%</div>
                <img src="./img/imgi_186_1352_ZIP_P_0106_T_RE.jpg" class="thumb-img" alt="상품 이미지">
                <div class="thumb-bag"></div>
              </div>
              <div class="card-info">
                
                <h3 class="card-name">한끼 한돈 김치두루치기_완조리</h3>
                <p class="card-desc">국내산 한돈으로 만든 든든한 한끼 두루치기</p>
                <div class="price-row">
                  <span class="discount">12%</span>
                  <span class="price">6400원</span>
                </div>
                <p class="origin-price">7,300원</p>
              </div>
            </article>
          </div>
        </div>
      </div>

      <div class="box3"></div>
      <div class="box4"></div>
      <div class="box5"></div>
    </main>

    <footer>
      <div class="footer-box"></div>
      <div class="footer-box"></div>
    </footer>

  </div>
</body>
</html>
