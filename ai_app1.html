<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>절대반지는?</title>
    <style>
        body {
            font-family: "Malgun Gothic", "맑은 고딕", "돋움", Dotum, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 0;
            background-color: #ffffff;
        }

        /* 중앙 정렬을 위한 컨테이너 */
        .content-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d30000;
            /* 진한 빨간색 */
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        p {
            margin: 10px 0;
            font-size: 16px;
        }

        /* 텍스트 색상 클래스 */
        .color-orange1 {
            color: #d07a4a;
        }

        /* 탁한 주황 */
        .color-blue {
            color: #5757b5;
        }

        /* 탁한 파랑/보라 */
        .color-yellow {
            color: #dada5e;
        }

        /* 탁한 노랑 */
        .color-orange2 {
            color: #c46a3a;
        }

        /* 짙은 탁한 주황 */
        .color-lightgreen {
            color: #b6cc5b;
        }

        /* 탁한 연두 */
        .color-red {
            color: #ba473e;
        }

        /* 탁한 다홍/빨강 */
        .color-green {
            color: #008000;
        }

        /* 초록 */

        .italic-text {
            font-style: italic;
            font-weight: bold;
            margin-top: 15px;
        }

        /* 텍스트 영역 너비에 맞추기 위한 래퍼 클래스 */
        .text-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: fit-content;
        }

        /* 본문 사이의 짧은 수평선 */
        hr.short-line {
            width: 100%;
            /* 부모(텍스트)의 너비를 따라감 */
            border: 0;
            border-top: 1px solid #cccccc;
            margin: 8px 0;
        }

        /* 하단의 긴 수평선 */
        hr.full-line {
            width: 100%;
            border: 0;
            border-top: 1px solid #b3b3b3;
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <div class="content-container">
        <h1>절대반지는?</h1>

        <div class="text-group">
            <p class="color-orange1">반지 세 개는 하늘 아래 요정왕들을 위한 것,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-blue">일곱 개는 돌의 전당에 있는 난쟁이 군주들을 위한 것,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-yellow">아홉 개는 죽은 운명의 인간을 위한 것,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-orange2">하나는 암흑의 왕좌에 앉은 암흑 제왕을 위한 것,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-blue">그곳은 망령들이 지배하는 모르도르의 땅,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-lightgreen">그 모든 반지를 다스릴 반지하나, 그 모든 반지를 찾기 위한 절대반지,</p>
            <hr class="short-line">
        </div>

        <div class="text-group">
            <p class="color-red">그 모든 반지를 암흑 속에 가두기 위한 반지는 절대반지뿐,</p>
            <hr class="short-line">
        </div>

        <p class="color-blue">바로 망령들이 누워 있는 모르도르의 땅에</p>
    </div>

    <hr class="full-line">

    <p class="color-green italic-text">반지의 제왕 중에서...</p>

</body>

</html>
