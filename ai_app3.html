<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그렇게 사랑합니다 - 한용운</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #7dcf7d;
            font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
            font-size: 14px;
            color: #000000;
            min-height: 100vh;
            padding: 40px 50px 60px 50px;
            line-height: 1.8;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 0.02em;
        }

        .author {
            text-align: right;
            font-size: 14px;
            margin-bottom: 50px;
            margin-right: 20px;
        }

        .stanza {
            margin-bottom: 40px;
            line-height: 1.9;
        }

        /* 1연: 왼쪽 정렬 */
        .stanza-1 {
            text-align: left;
            padding-left: 0;
        }

        /* 2연: 가운데 정렬 */
        .stanza-2 {
            text-align: center;
        }

        /* 3연: 오른쪽 정렬 */
        .stanza-3 {
            text-align: right;
            padding-right: 20px;
        }

        p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

    <h1>그렇게 사랑합니다.</h1>

    <div class="author">-한용운-</div>

    <div class="stanza stanza-1">
        <p>사랑한다는 사랑앞에서는</p>
        <p>사랑 한다는말을 안합니다.</p>
        <p>안하는것이아니라</p>
        <p>못하는것이 사랑의 진실입니다.</p>
    </div>

    <div class="stanza stanza-2">
        <p>잊어버려야 하겠다는 말은</p>
        <p>잊을수 없다는말입니다.</p>
        <p>정말 잊고싶을 때는 말이 없습니다.</p>
    </div>

    <div class="stanza stanza-3">
        <p>헤어질때 돌아보지 않는것은</p>
        <p>너무 헤어지기 싫기때문입니다.</p>
        <p>그것은 헤어지는것이 아니라</p>
        <p>같이 있다는 말입니다.</p>
    </div>

</body>

</html>
