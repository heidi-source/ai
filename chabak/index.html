<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CAR BAK Splash</title>
    <style>
        :root {
            --bg: #e9e9e9;
            --brand: #1f66c2;
            --text: #1f66c2;
            --phone-width: 375px;
            --phone-height: 812px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
        }

        body {
            display: grid;
            place-items: center;
        }

        .app {
            position: relative;
            width: min(100vw, var(--phone-width));
            height: 100vh;
            max-height: var(--phone-height);
            background: var(--bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            isolation: isolate;
        }

        @supports (height: 100dvh) {
            .app {
                height: 100dvh;
            }
        }

        .logo-wrap {
            width: 58%;
            max-width: 230px;
            min-width: 170px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(-2%);
            animation: intro 1.1s ease-out both;
        }

        .logo {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 18px rgba(31, 102, 194, 0.1));
        }

        .loading {
            position: absolute;
            bottom: 86px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(31, 102, 194, 0.35);
            animation: pulse 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        .status {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            letter-spacing: 0.12em;
            color: rgba(31, 102, 194, 0.72);
            text-transform: uppercase;
        }

        .fade-out {
            animation: fadeOut 0.45s ease forwards;
        }

        @keyframes intro {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(-2%) scale(1);
            }
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                background: rgba(31, 102, 194, 0.3);
            }

            40% {
                transform: scale(1.25);
                background: rgba(31, 102, 194, 0.95);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>
    <main class="app" id="splashScreen" aria-label="CAR BAK splash screen">
        <div class="logo-wrap">
            <svg class="logo" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img"
                aria-label="CAR BAK logo">
                <g fill="none" stroke="none">
                    <path d="M20 122 L116 62 L160 34 L206 62 L300 122 L274 122 L206 82 L160 54 L114 82 L46 122 Z"
                        fill="#1f66c2" />
                    <path d="M58 151 L90 116 L230 116 L264 151 Z" fill="#1f66c2" />
                    <text x="160" y="114" text-anchor="middle" font-size="36" font-weight="700" fill="#1f66c2"
                        font-family="Arial, Helvetica, sans-serif">CARBAK</text>
                    <g transform="translate(76 94)">
                        <path
                            d="M18 40 C22 28, 42 19, 68 17 L116 14 C129 13, 142 20, 151 31 L168 33 C178 34, 188 41, 190 52 L192 61 C193 69, 186 76, 178 76 L171 76 C170 64, 161 55, 149 55 C136 55, 126 64, 125 76 L67 76 C66 64, 56 55, 44 55 C30 55, 19 66, 19 80 L12 80 C6 80, 1 75, 1 69 L1 57 C1 48, 8 42, 18 40 Z"
                            fill="#1f66c2" />
                        <circle cx="44" cy="78" r="16" fill="#ffffff" />
                        <circle cx="44" cy="78" r="10" fill="#1f66c2" />
                        <circle cx="149" cy="78" r="16" fill="#ffffff" />
                        <circle cx="149" cy="78" r="10" fill="#1f66c2" />
                        <path d="M47 33 C59 24, 78 22, 108 21 C116 21, 124 25, 129 31 L137 40 L44 40 Z" fill="#ffffff"
                            opacity="0.9" />
                        <ellipse cx="110" cy="56" rx="10" ry="5" fill="#ffffff" opacity="0.95" />
                        <ellipse cx="134" cy="52" rx="11" ry="5" fill="#ffffff" opacity="0.95" />
                    </g>
                    <text x="160" y="210" text-anchor="middle" font-size="58" font-weight="800" fill="#1f66c2"
                        font-family="Arial, Helvetica, sans-serif">CAR BAK</text>
                </g>
            </svg>
        </div>

        <div class="loading" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="status">loading</div>
    </main>

    <script>
        const splash = document.getElementById('splashScreen');

        window.addEventListener('load', () => {
            setTimeout(() => {
                splash.classList.add('fade-out');

                setTimeout(() => {
                    window.location.href = 'https://www.naver.com';
                }, 450);
            }, 3000);
        });
    </script>
</body>

</html>
