<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>차박 앱 온보딩</title>
    <style>
        :root {
            --primary-blue: #5b75b9;
            --text-dark: #2c3e50;
            --text-gray: #95a5a6;
            --bg-white: #ffffff;
            --indicator-inactive: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 30px 40px 30px;
            justify-content: space-between;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* 텍스트 영역 */
        .header-section {
            animation: fadeInDown 0.8s ease-out;
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            color: #3e5481;
            margin-bottom: 15px;
        }

        .title span {
            color: var(--text-gray);
            font-weight: 500;
            font-size: 26px;
        }

        .subtitle {
            font-size: 16px;
            color: #a0aec0;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 이미지/캐릭터 영역 */
        .image-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: zoomIn 1s ease-out;
        }

        /* 이미지 플레이스홀더 (실제 이미지가 없을 경우를 대비한 그래픽) */
        .character-box {
            width: 80%;
            aspect-ratio: 1/1.2;
            background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .character-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 실제 이미지가 있다면 아래 클래스에 background-image를 추가하세요 */
        .actual-image {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* 여기에 캐릭터 이미지 URL을 넣을 수 있습니다 */
        }

        /* 인디케이터 (페이지 점) */
        .indicator-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--indicator-inactive);
            transition: all 0.3s ease;
        }

        .dot.active {
            width: 12px;
            height: 12px;
            background-color: var(--primary-blue);
        }

        /* 하단 버튼 */
        .footer-section {
            width: 100%;
        }

        .start-btn {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            background-color: var(--primary-blue);
            color: white;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.1s active, background-color 0.2s;
            box-shadow: 0 4px 14px rgba(91, 117, 185, 0.3);
        }

        .start-btn:active {
            transform: scale(0.98);
            background-color: #4a619c;
        }

        /* 애니메이션 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 모바일 최적화 대응 */
        @media (max-height: 600px) {
            .container {
                padding-top: 30px;
            }

            .title {
                font-size: 24px;
            }

            .character-box {
                width: 60%;
            }

            .indicator-section {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 텍스트 헤더 -->
        <div class="header-section">
            <h1 class="title">차박,<br>어디로 <span>떠나야 할지 모르겠나요</span></h1>
            <p class="subtitle">지도 기반의 위치 앱 및 키워드 검색으로 내가 원하는 장소를 한번에</p>
        </div>

        <!-- 이미지 영역 -->
        <div class="image-section">
            <div class="character-box">
                <!-- 여기에 실제 캐릭터 이미지를 배치합니다 -->
                <div class="actual-image">
                    <svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="width: 100%; height: 100%;">
                        <!-- 단순화된 곰 캐릭터 SVG 표현 (원래 이미지의 느낌을 살림) -->
                        <circle cx="100" cy="120" r="70" fill="#5b75b9" /> <!-- 몸통/얼굴 -->
                        <circle cx="60" cy="65" r="20" fill="#5b75b9" /> <!-- 귀1 -->
                        <circle cx="140" cy="65" r="20" fill="#5b75b9" /> <!-- 귀2 -->
                        <rect x="70" y="45" width="60" height="20" rx="10" fill="#f1c40f" /> <!-- 모자 -->
                        <circle cx="85" cy="110" r="8" fill="white" /> <!-- 눈1 -->
                        <circle cx="115" cy="110" r="8" fill="white" /> <!-- 눈2 -->
                        <path d="M90 140 Q100 150 110 140" stroke="white" stroke-width="3" fill="none" /> <!-- 입 -->

                        <!-- 아이디어 전구 아이콘 느낌 -->
                        <circle cx="150" cy="40" r="15" fill="#f1c40f" opacity="0.6">
                            <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
                        </circle>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 페이지 표시 및 버튼 -->
        <div class="footer-wrap">
            <div class="indicator-section">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="footer-section">
                <button class="start-btn" id="startBtn">시작하기</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const dots = document.querySelectorAll('.dot');
            let currentStep = 0;

            // 시작하기 버튼 클릭 이벤트
            startBtn.addEventListener('click', () => {
                // 실제 앱 전환 로직이 들어갈 자리입니다.
                // 여기서는 시각적인 피드백을 위해 버튼 텍스트를 변경해봅니다.
                startBtn.innerText = "로딩 중...";
                setTimeout(() => {
                    const message = document.createElement('div');
                    message.style.cssText = `
                        position: fixed;
                        bottom: 100px;
                        left: 50%;
                        transform: translateX(-50%);
                        background: rgba(0,0,0,0.8);
                        color: white;
                        padding: 12px 24px;
                        border-radius: 30px;
                        font-size: 14px;
                        z-index: 1000;
                    `;
                    message.innerText = "메인 화면으로 이동합니다.";
                    document.body.appendChild(message);

                    setTimeout(() => message.remove(), 2000);
                    startBtn.innerText = "시작하기";
                }, 1000);
            });

            // 인디케이터 클릭 시 시뮬레이션
            dots.forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    dots.forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    currentStep = index;
                });
            });
        });
    </script>
</body>

</html>
